{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
{% endblock %}

{% block content %}

<section class="page-header">
    <h1>&#127759; Observation Map</h1>
    <p>Explore where observations have been recorded across all knowledge categories.</p>
</section>

<section class="map-container">
    <div id="map" style="width: 100%; height: 600px; border-radius: 12px;"></div>
</section>

{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
    // Initialize map centered on Alaska
    const map = L.map('map').setView([64.5, -150.0], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Fetch approved entries — need auth, so include credentials
    fetch('/api/entries/approved', { credentials: 'same-origin' })
        .then(r => {
            if (!r.ok) throw new Error('Not authorized or server error');
            return r.json();
        })
        .then(data => {
            data.forEach(entry => {
                const marker = L.marker([entry.lat, entry.lng]).addTo(map);
                // Escape all user-generated content to prevent XSS
                const safeName = String(entry.recorder_name || '').replace(/[<>&"']/g, c => ({
                    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
                }[c]));
                const safeCategory = String(entry.category || '').replace(/[<>&"']/g, c => ({
                    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
                }[c]));
                const safePlant = String(entry.plant_name || '').replace(/[<>&"']/g, c => ({
                    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
                }[c]));
                const safeLocation = String(entry.location || '').replace(/[<>&"']/g, c => ({
                    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
                }[c]));
                const safeObs = String(entry.observation || '').substring(0, 100).replace(/[<>&"']/g, c => ({
                    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
                }[c]));

                marker.bindPopup(
                    `<strong>${safeCategory}</strong><br>` +
                    `<em>By: ${safeName}</em><br>` +
                    (safePlant ? `Plant: ${safePlant}<br>` : '') +
                    (safeLocation ? `${safeLocation}<br>` : '') +
                    (safeObs ? `${safeObs}${entry.observation.length > 100 ? '...' : ''}` : '')
                );
            });
        })
        .catch(err => {
            console.error('Failed to load entries:', err);
            document.getElementById('map').innerHTML = '<p style="padding:2rem;">Failed to load map data. You may need to log in.</p>';
        });
</script>
{% endblock %}
