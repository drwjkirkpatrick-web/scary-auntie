{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h1>&#127759; Observation Map</h1>
    <p>Explore where plants have been observed across Alaska.</p>
</section>

<section class="map-container">
    <div id="map" style="width: 100%; height: 600px; border-radius: 12px;"></div>
</section>

<script>
    // Initialize map centered on Alaska
    const map = L.map('map').setView([64.5, -150.0], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Fetch approved entries
    fetch('/api/entries/approved')
        .then(r => r.json())
        .then(data => {
            data.forEach(entry => {
                const marker = L.marker([entry.lat, entry.lng]).addTo(map);
                marker.bindPopup(`
                    <strong>${entry.plant_name}</strong><br>
                    <em>Observed by: ${entry.recorder_name}</em><br>
                    ${entry.location ? entry.location + '<br>' : ''}
                    ${entry.observation ? entry.observation.substring(0, 100) + (entry.observation.length > 100 ? '...' : '') : ''}
                `);
            });
        })
        .catch(err => {
            console.error('Failed to load entries:', err);
            document.getElementById('map').innerHTML = '<p>Failed to load map data.</p>';
        });
</script>

{% endblock %}
