{% extends "base.html" %}

{% block content %}

<section class="admin-login">
    <div class="login-card">
        <h1>&#128272; Teacher Login</h1>
        <p>Access the monitoring dashboard for scary-auntie.</p>

        <form method="post" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>

        <hr>
        <p class="help-text">
            <em>Default admin: username <code>admin</code>, password <code>scary-auntie-admin</code></em><br>
            <strong>Change this in production!</strong> Set the <code>ADMIN_PASSWORD</code> environment variable.
        </p>
    </div>
</section>

{% endblock %}
