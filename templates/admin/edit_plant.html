{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h1>&#9998; Edit Plant: {{ plant.english_name }}</h1>
    <div class="admin-actions">
        <a href="{{ url_for('admin_plants') }}" class="btn btn-secondary">Back to Plants</a>
        <a href="{{ url_for('plant_detail', plant_id=plant.id) }}" class="btn btn-secondary" target="_blank">View Public Page</a>
        <a href="{{ url_for('admin_logout') }}" class="btn btn-danger">Logout</a>
    </div>
</section>

<section class="form-section">
    <form method="post" action="{{ url_for('admin_edit_plant', plant_id=plant.id) }}" class="entry-form">

        <div class="form-group">
            <label for="english_name">English Name *</label>
            <input type="text" id="english_name" name="english_name" required
                   value="{{ plant.english_name }}">
        </div>

        <div class="form-group">
            <label for="latin_binomial">Latin Binomial *</label>
            <input type="text" id="latin_binomial" name="latin_binomial" required
                   value="{{ plant.latin_binomial }}">
        </div>

        <div class="form-group">
            <label for="native_alaskan_name">Native Name</label>
            <input type="text" id="native_alaskan_name" name="native_alaskan_name"
                   value="{{ plant.native_alaskan_name or '' }}">
        </div>

        <div class="form-group">
            <label for="native_language">Native Language</label>
            <input type="text" id="native_language" name="native_language"
                   value="{{ plant.native_language or '' }}">
        </div>

        <div class="form-group">
            <label for="family">Plant Family</label>
            <input type="text" id="family" name="family"
                   value="{{ plant.family or '' }}">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ plant.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="habitat">Habitat</label>
            <input type="text" id="habitat" name="habitat"
                   value="{{ plant.habitat or '' }}">
        </div>

        <div class="form-group">
            <label for="traditional_uses">Traditional Uses</label>
            <textarea id="traditional_uses" name="traditional_uses" rows="3">{{ plant.traditional_uses or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="parts_used">Parts Used</label>
            <input type="text" id="parts_used" name="parts_used"
                   value="{{ plant.parts_used or '' }}">
        </div>

        <div class="form-group">
            <label for="preparation">Preparation</label>
            <textarea id="preparation" name="preparation" rows="3">{{ plant.preparation or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="cautions">Cautions</label>
            <textarea id="cautions" name="cautions" rows="2">{{ plant.cautions or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="source_author">Source Author(s)</label>
            <input type="text" id="source_author" name="source_author"
                   value="{{ plant.source_author or '' }}">
        </div>

        <div class="form-group">
            <label for="source_url">Source URL</label>
            <input type="url" id="source_url" name="source_url"
                   value="{{ plant.source_url or '' }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">
                &#128190; Save Changes
            </button>
        </div>
    </form>
</section>

{% endblock %}
